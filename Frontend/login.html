<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TuneVault - Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-wrapper">
    <h2 class="section-title">Login Page</h2>

    <div class="login-card">
      <div class="top-bar">TuneVault — Login</div>

      <div class="row welcome">Welcome Back 🎵</div>
      <div class="row subtitle">Sign in to your music library</div>

      <div class="row label-row">Username or Email</div>
      <div class="row input-row">
        <span class="bracket">[</span>
        <input type="text">
        <span class="bracket">]</span>
      </div>

      <div class="row label-row">Password</div>
      <div class="row input-row password-row">
        <span class="bracket">[</span>
        <input type="password">
        <span class="bracket">]</span>
        <span class="eye">👁</span>
      </div>

      <button class="login-button" type="button">[ LOGIN ]</button>

      <div class="row register-link">
        Don't have an account?
        <a href="register.html">Register here</a>
      </div>
    </div>
  </div>
</body>
</html>
