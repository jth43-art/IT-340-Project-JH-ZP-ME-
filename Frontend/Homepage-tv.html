!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuneVault - Home</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="page-wrapper">

        <!-- TOP BAR -->
        <div class="top-bar">
            TuneVault - Home
        </div>

        <!-- NAVIGATION -->
        <div class="row">
            <strong>Home | Library | Playlists | Upload</strong>
        </div>

        <!-- USER INFO -->
        <div class="row">
            Username &nbsp; | &nbsp; Logout
        </div>

        <!-- NOW PLAYING -->
        <div class="row welcome">
            Now Playing: Song Title – Artist Name
        </div>

        <div class="row">
            ▶ &nbsp;&nbsp;&nbsp; 2:34 / 4:12
        </div>

        <!-- SEARCH BAR -->
        <div class="row">
            <input 
                type="text" 
                placeholder="Search songs, artists, albums..."
                style="width: 70%; border-bottom: 2px solid #b7b7b7; background: transparent; text-align:center;"
            >
        </div>

        <!-- RECENT + PLAYLISTS HEADER -->
        <div class="row label-row">
            Recently Added &nbsp; | &nbsp; My Playlists
        </div>

        <!-- SONG + PLAYLIST CARDS -->
        <div class="row">
            [ Song ] &nbsp; [ Song ] &nbsp; [ Song ] &nbsp;
            [ Playlist 1 ] &nbsp; [ Playlist 2 ]
        </div>

        <!-- FOOTER -->
        <div class="row subtitle">
            TuneVault © 2026 — Self-Hosted
        </div>

    </div>
</body>
</html>
