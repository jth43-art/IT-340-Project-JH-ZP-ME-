<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TuneVault - Register</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page-wrapper">
  <h2 class="section-title">Register Page</h2>

  <div class="login-card">

    <div class="top-bar">
      TuneVault — Register
    </div>

    <div class="row welcome">
      Create Your Account 🎵
    </div>

    <div class="row label-row">Full Name</div>
    <div class="row input-row">
      <span class="bracket">[</span>
      <input type="text">
      <span class="bracket">]</span>
    </div>

    <div class="row label-row">Email Address</div>
    <div class="row input-row">
      <span class="bracket">[</span>
      <input type="email">
      <span class="bracket">]</span>
    </div>

    <div class="row label-row">Username</div>
    <div class="row input-row">
      <span class="bracket">[</span>
      <input type="text">
      <span class="bracket">]</span>
    </div>

    <div class="row label-row">Password</div>
    <div class="row input-row password-row">
      <span class="bracket">[</span>
      <input type="password">
      <span class="bracket">]</span>
      <span class="eye">👁</span>
    </div>

    <div class="row register-link">
      <input type="checkbox"> I agree to the Terms of Service
    </div>

    <button class="login-button">[ CREATE ACCOUNT ]</button>

    <div class="row register-link">
      Already have an account?
      <a href="login.html">Login here</a>
    </div>

  </div>

</div>

</body>
</html>
