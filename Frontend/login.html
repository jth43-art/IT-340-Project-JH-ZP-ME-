<!-- Used AI to generate login.html code -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TuneVault - Login</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="page-wrapper">
  <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="login-card">
    <div class="top-bar">LOGIN</div>
   
    <div class="row">
      <div class="welcome">Welcome Back</div>
    </div>

    <div class="row label-row">Email Address</div>
    <div class="row input-row">
      <span class="bracket">[</span>
      <input type="email" formControlName="email" placeholder="email@example.com">
      <span class="bracket ribbon">]</span>
    </div>
    <div *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
         style="color: red; font-size: 11px; text-align: center;">
      Please enter a valid email address.
    </div>

    <div class="row label-row">Password</div>
    <div class="row input-row">
      <span class="bracket">[</span>
      <input type="password" formControlName="password" placeholder="••••••••">
      <span class="bracket">]</span>
    </div>

    <div class="row">
      <button type="submit" [disabled]="loginForm.invalid" class="login-button">
        LOG IN
      </button>
    </div>

    <div class="row register-link">
      Don't have an account? <a routerLink="/register">Register here</a>
    </div>
  </form>
</div>

<script>
function toggleLoginPassword() {
const password = document.getElementById("loginPassword");

if (password.type === "password") {
password.type = "text";
} else {
password.type = "password";
}
}
</script>

</body>
</html>
