<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TuneVault - Home</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="page-wrapper">
<h2 class="section-title">Welcome to TuneVault</h2>
<div class="login-card">
<div class="top-bar">
TuneVault — Home
</div>
<div class="row welcome">
Your Music Dashboard 🎵
</div>
<!-- NOW PLAYING -->
<div class="row label-row">Now Playing</div>
<div class="row subtitle" id="nowPlayingTitle">Loading...</div>
<div class="row subtitle" id="nowPlayingArtist"></div>
<div class="row subtitle" id="nowPlayingTime"></div>
<!-- RECENT SONGS -->
<div class="row label-row">Recently Played</div>
<div class="row" id="recentSongs">Loading...</div>
<!-- PLAYLISTS -->
<div class="row label-row">Your Playlists</div>
<div class="row" id="playlists">Loading...</div>
<!-- NAVIGATION -->
<div class="row register-link">
<a href="login.html">Logout</a>
</div>
</div>
</div>
<script>
document.addEventListener("DOMContentLoaded", () => {
    fetch("http://localhost:3000/homepage")
        .then(res => res.json())
        .then(data => {
            // NOW PLAYING
            document.getElementById("nowPlayingTitle").textContent =
                data.nowPlaying.title;
            document.getElementById("nowPlayingArtist").textContent =
                "By " + data.nowPlaying.artist;
            document.getElementById("nowPlayingTime").textContent =
                data.nowPlaying.currentTime + " / " + data.nowPlaying.duration;
            // RECENT SONGS
            const recentSongsDiv = document.getElementById("recentSongs");
            recentSongsDiv.innerHTML = "";
            data.recentSongs.forEach(song => {
                const row = document.createElement("div");
                row.classList.add("subtitle");
                row.textContent = `${song.title} — ${song.artist}`;
                recentSongsDiv.appendChild(row);
            });
            // PLAYLISTS
            const playlistsDiv = document.getElementById("playlists");
            playlistsDiv.innerHTML = "";
            data.playlists.forEach(pl => {
                const row = document.createElement("div");
                row.classList.add("subtitle");
                row.textContent = `${pl.name} (${pl.count} songs)`;
                playlistsDiv.appendChild(row);
            });
        })
        .catch(err => {
            console.error("Homepage fetch error:", err);
        });
});
</script>
</body>
</html>
